server {
    listen 80;
    server_name _;

    # Bulk import/preview, exports, backups (default nginx limit is 1m).
    client_max_body_size 1024m;

    root /var/www/expo/client/dist;
    index index.html;

    # Vite emits hashed bundles under /assets/*.js; the React route is also "/assets".
    # A request to "/assets/" matches the real directory and nginx returns 403 without an index file.
    location = /assets {
        try_files /index.html =404;
    }
    location = /assets/ {
        try_files /index.html =404;
    }

    # Dashboard Socket.IO — must proxy to Node (not served from dist/).
    location /socket.io {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 14400s;
        proxy_read_timeout 14400s;
        proxy_buffering off;
    }

    # Frontend SPA
    location / {
        try_files $uri /index.html;
    }

    # Liveness/readiness via Nginx (matches nginx.docker.conf and deploy-web-safe.sh default HEALTH_URL)
    location = /healthz {
        proxy_pass http://127.0.0.1:5000/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /readyz {
        proxy_pass http://127.0.0.1:5000/readyz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API reverse proxy (same host by default)
    # Backup upload/restore can be large and long-running.
    location /api/system/backups/ {
        client_max_body_size 1024m;
        proxy_pass http://127.0.0.1:5000/api/system/backups/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 14400s;
        proxy_read_timeout 14400s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 14400s;
        proxy_read_timeout 14400s;
    }

    # Static uploads served from backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
