server {
    listen 80;
    server_name _;
    client_max_body_size 1024m;

    root /usr/share/nginx/html;
    index index.html;

    # Vite build output uses /assets/* for chunks; React also uses route "/assets".
    # "/assets/" would otherwise resolve to the static directory and return 403.
    location = /assets {
        try_files /index.html =404;
    }
    location = /assets/ {
        try_files /index.html =404;
    }

    location /socket.io {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 14400s;
        proxy_read_timeout 14400s;
        proxy_buffering off;
    }

    location / {
        try_files $uri /index.html;
    }

    # Same paths as API server (for probes via web port without /api prefix)
    location = /healthz {
        proxy_pass http://app:5000/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /readyz {
        proxy_pass http://app:5000/readyz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://app:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 14400s;
        proxy_read_timeout 14400s;
    }

    location /api/system/backups/ {
        client_max_body_size 1024m;
        proxy_pass http://app:5000/api/system/backups/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 14400s;
        proxy_read_timeout 14400s;
    }

    location /uploads/ {
        proxy_pass http://app:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
