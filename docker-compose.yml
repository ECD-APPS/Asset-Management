version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: expo-asset-app
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/expo_stores?retryWrites=true&w=majority
      - SESSION_MAX_AGE_MS=2592000000
      - COOKIE_SECURE=false
      - ENABLE_CSRF=true
      - CORS_ORIGIN=http://localhost:8080
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/server/uploads
      - backups:/app/server/backups
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: expo-asset-web
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: expo-asset-mongo
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  uploads:
  backups:
